name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        type: choice
        description: 'Release Version'
        required: true
        default: 'latest'
        options:
          - next
          - beta
          - alpha
          - latest
      branch:
        description: 'Release Branch'
        required: true
        default: 'main'
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    if: github.event_name == 'workflow_dispatch' || github.event.comment.body == '/release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 25
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install pnpm
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: pnpm install

      - name: Build @veaba/qrcode-js-shared
        run: pnpm --filter @veaba/qrcode-js-shared build

      - name: Build @veaba/qrcode-wasm
        run: pnpm --filter @veaba/qrcode-wasm build

      - name: Build @veaba/qrcode-js
        run: pnpm --filter @veaba/qrcode-js build

      - name: Build @veaba/qrcode-node
        run: pnpm --filter @veaba/qrcode-node build

      - name: Build @veaba/qrcode-bun
        run: pnpm --filter @veaba/qrcode-bun build

      # ========================================
      # Publish Rust Crates to crates.io
      # ========================================
      # 由 changesets 管理版本号，始终使用新版本发布
      # 如果版本已存在，cargo publish 会报错，我们忽略错误继续

      - name: Get versions from package.json
        id: versions
        run: |
          echo "qrcode_rust_shared=$(node -p "require('./packages/qrcode-rust-shared/package.json').version")" >> $GITHUB_OUTPUT
          echo "qrcode_rust=$(node -p "require('./packages/qrcode-rust/package.json').version")" >> $GITHUB_OUTPUT
          echo "qrcode_fast=$(node -p "require('./packages/qrcode-fast/package.json').version")" >> $GITHUB_OUTPUT

      # 发布 qrcode-rust-shared，如果版本已存在则忽略
      - name: Publish qrcode-rust-shared to crates.io
        continue-on-error: true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          echo "📦 Publishing qrcode-rust-shared v${{ steps.versions.outputs.qrcode_rust_shared }}..."
          cargo publish -p qrcode-rust-shared --token "$CARGO_REGISTRY_TOKEN" --registry crates-io 2>&1 || {
            echo "⚠️ May already exist, continuing..."
          }

      - name: Wait for crates.io index
        run: sleep 30

      # 发布 qrcode-rust，如果版本已存在则忽略
      - name: Publish qrcode-rust to crates.io
        continue-on-error: true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          echo "📦 Publishing qrcode-rust v${{ steps.versions.outputs.qrcode_rust }}..."
          cargo publish -p qrcode-rust --token "$CARGO_REGISTRY_TOKEN" --registry crates-io 2>&1 || {
            echo "⚠️ May already exist, continuing..."
          }

      # 发布 qrcode-fast，如果版本已存在则忽略
      - name: Publish qrcode-fast to crates.io
        continue-on-error: true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          echo "📦 Publishing qrcode-fast v${{ steps.versions.outputs.qrcode_fast }}..."
          cargo publish -p qrcode-fast --token "$CARGO_REGISTRY_TOKEN" --registry crates-io 2>&1 || {
            echo "⚠️ May already exist, continuing..."
          }

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          version: pnpm ci:version
          publish: pnpm ci:publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
